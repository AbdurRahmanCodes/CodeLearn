<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — CodeLearn Research</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="login-page">
        <div class="login-card">
            <!-- Logo -->
            <div class="login-card__logo">
                <div class="brand-logo" style="width:36px;height:36px;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="16 18 22 12 16 6" />
                        <polyline points="8 6 2 12 8 18" />
                    </svg>
                </div>
                <div>
                    <div style="font-weight:700;font-size:.95rem;color:var(--text);">CodeLearn Admin</div>
                    <div style="font-size:.72rem;color:var(--text-muted);">COM748 Research Platform</div>
                </div>
            </div>

            <h2 style="font-size:1.25rem;margin-bottom:.375rem;">Research Dashboard</h2>
            <p style="font-size:.83rem;margin-bottom:1.5rem;">Sign in to access participant analytics and data export.
            </p>

            {% if error %}
            <div class="login-error">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="12" y1="8" x2="12" y2="12" />
                    <line x1="12" y1="16" x2="12.01" y2="16" />
                </svg>
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="{{ url_for('admin_login') }}">
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input id="username" name="username" type="text" class="form-input" placeholder="Enter username"
                        autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input id="password" name="password" type="password" class="form-input" placeholder="Enter password"
                        autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn btn--primary" style="width:100%;justify-content:center;">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
                        <polyline points="10 17 15 12 10 7" />
                        <line x1="15" y1="12" x2="3" y2="12" />
                    </svg>
                    Sign In to Dashboard
                </button>
            </form>

            <div style="text-align:center;margin-top:1.5rem;padding-top:1.25rem;border-top:1px solid var(--border);">
                <a href="{{ url_for('index') }}" style="font-size:.78rem;color:var(--text-muted);">
                    ← Back to Participant Platform
                </a>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script>if (typeof lucide !== 'undefined') lucide.createIcons();</script>
</body>

</html>
